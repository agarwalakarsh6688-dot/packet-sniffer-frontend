<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live TCP Packet Sniffer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-content">

    <!-- LANDING PAGE -->
    <section id="landing" class="page active">
        <h1>Live TCP Packet Sniffer</h1>
        <p class="subtitle">
            Simulated TCP packets can be fetched in real time through a secure API.
        </p>
        <button id="startMonitoring" class="primary-btn">
            START MONITORING
        </button>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboard" class="page hidden">

        <div class="top-bar">
            <span id="apiStatus" class="status">● Checking API...</span>
            <button id="cleanWebsite" class="secondary-btn">Clean Website</button>
        </div>

        <div class="controls">
            <button id="stopBtn" class="danger-btn">STOP</button>
            <button id="clearBtn" class="secondary-btn">CLEAR TABLE</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Source IP</th>
                    <th>Source Port</th>
                    <th>Destination IP</th>
                    <th>Destination Port</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="packetTable"></tbody>
        </table>

    </section>

</div>

<footer>
    © 2026 Akarsh Agarwal
</footer>

<script src="script.js"></script>
</body>
</html>
