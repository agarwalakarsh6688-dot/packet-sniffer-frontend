<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live TCP Packet Sniffer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="networkCanvas"></canvas>

<div class="main-content">

    <section id="landing" class="page">
        <h1>Live TCP Packet Sniffer</h1>
        <p class="subtitle">
            Simulated TCP packets can be fetched in real time through a secure API.
        </p>
        <button id="startMonitoring" class="btn-primary">
            START MONITORING
        </button>
    </section>

    <section id="dashboard" class="page hidden">

        <div class="top-bar">
            <span id="apiStatus" class="status">● Checking API...</span>
            <button id="cleanWebsite" class="btn-secondary">Clean Website</button>
        </div>

        <div class="controls">
            <button id="stopBtn" class="btn-danger">STOP</button>
            <button id="clearBtn" class="btn-secondary">CLEAR TABLE</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Source IP</th>
                        <th>Source Port</th>
                        <th>Destination IP</th>
                        <th>Destination Port</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="packetTable"></tbody>
            </table>
        </div>

    </section>

</div>

<footer>
    © 2026 Akarsh Agarwal
</footer>

<script src="script.js"></script>
</body>
</html>
